<body>

    <div class="ms-auto position-relative">

        <ul class="dropdown-menu dropdown-menu-end" style="border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: none; min-width: 250px;" aria-labelledby="userDropdown">
          <li>

<div class="sidebar" id="sidebar">
  <h5>Menu <span class="close-btn" onclick="toggleSidebar()">&times;</span></h5>
  <hr>

  <div class="d-grid gap-3 mt-4">
    <button class="btn btn-primary rounded-pill" onclick="scrollToForm()">Create Event</button>
    <button class="btn btn-primary rounded-pill" onclick="window.location.href='shop.html'">Shop</button>
    <button class="btn btn-outline-light rounded-pill">Task Bar</button>
    <button class="btn btn-dark rounded-pill" data-bs-toggle="modal" data-bs-target="#loginModal">Log in/Sign-up</button>

</div>
<section class="hero text-white text-center">
  <div class="container hero-content">

    <h1 class="fw-bold display-4 mb-3">Plan Campus Events Smarter</h1>
    <p class="lead mb-5">Organize events, tasks, and announcements in one place</p>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card p-4 shadow">
          <h5>Upcoming Events</h5>
          <ul id="eventList" class="list-group"></ul>
        </div>

      </div>
    </div>

  </div>
</section>
<section class="section" id="formSection">
  <div class="container">
    <h2 class="text-center mb-4">Create Event</h2>

    <div class="row justify-content-center">
      <div class="col-lg-6">

        <form id="eventForm" class="card p-4 shadow">

          <input type="text" id="firstName" class="form-control mb-2" placeholder="First Name" required>
          <input type="text" id="middleName" class="form-control mb-2" placeholder="Middle Name (optional)">
          <input type="text" id="lastName" class="form-control mb-2" placeholder="Last Name" required>
          <input type="date" id="date" class="form-control mb-2" required>

          <select id="location" class="form-select mb-2" required>
            <option value="">Select Location</option>
            <option>PUP Sta. Mesa</option>
            <option>PUP Taguig</option>
            <option>PUP Quezon City</option>
            <option>PUP San Juan</option>
            <option>PUP Parañaque</option>
            <option>PUP Bataan</option>
            <option>PUP Bulacan</option>
            <option>PUP Nueva Ecija</option>
            <option>PUP Cavite</option>
            <option>PUP Laguna</option>
            <option>PUP Sto. Tomas</option>
            <option>PUP Talisay</option>
            <option>PUP Lopez</option>
            <option>PUP Mindoro</option>
            <option>PUP Ragay</option>
            <option>PUP Maragondon</option>
          </select>

          <select id="type" class="form-select mb-2" required>
            <option value="">Type of Event</option>
            <option>Campus Event</option>
            <option>Organizational Event</option>
            <option>Outreach</option>
            <option>Departmental Event</option>
          </select>

          <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

          <button class="btn btn-primary w-100">Create Event</button>
        </form>
      </div>
    </div>
  </div>
</section>
<div class="modal fade" id="loginModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Login</h5>
      <input class="form-control mb-2" placeholder="Email">
      <input type="password" class="form-control mb-2" placeholder="Password">
      <button class="btn btn-primary w-100">Login</button>
    </div>
  </div>
</div>


<script>
let events = JSON.parse(localStorage.getItem("events")) || [];
let editIndex = -1;

const list = document.getElementById("eventList");
const form = document.getElementById("eventForm");

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

function scrollToForm() {
  document.getElementById("formSection").scrollIntoView({ behavior: "smooth" });
}

function renderEvents() {
  list.innerHTML = "";

  if (events.length === 0) {
    list.innerHTML = "<li class='list-group-item'>No events yet</li>";
    return;
  }

  events.forEach((e, i) => {
    const li = document.createElement("li");
    li.className = "list-group-item";

    li.innerHTML = `
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <strong>${e.type}</strong><br>
      <small>📅 ${e.date}</small>
    </div>

    <div>
      <button class="btn btn-sm btn-warning" onclick="editEvent(${i})">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteEvent(${i})">Delete</button>
    </div>
  </div>
`;

    list.appendChild(li);
  });

  localStorage.setItem("events", JSON.stringify(events));
}

form.addEventListener("submit", e => {
  e.preventDefault();

  const data = {
    name: `${firstName.value} ${middleName.value} ${lastName.value}`,
    date: date.value,
    location: location.value,
    type: type.value,
    email: email.value
  };

  if (editIndex === -1) {
    events.push(data);
  } else {
    events[editIndex] = data;
    editIndex = -1;
  }

  form.reset();
  renderEvents();
});

function deleteEvent(i) {
  events.splice(i, 1);
  renderEvents();
}

function editEvent(i) {
  const e = events[i];
  const names = e.name.split(" ");

  firstName.value = names[0];
  middleName.value = names[1] || "";
  lastName.value = names[2] || "";
  date.value = e.date;
  location.value = e.location;
  type.value = e.type;
  email.value = e.email;

  editIndex = i;
}

renderEvents();
</script>
<div class="modal fade" id="authModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      <div class="modal-header" style="border: none; padding: 30px 40px 0;">
        <h4 class="modal-title w-100 text-center fw-bold" style="color: #1a5778;">Welcome to CampusShop</h4>
      </div>
      <div class="modal-body p-0">
        <div id="loginTab" class="tab-pane active p-4">
          <form id="loginForm">

            <div class="mb-4">

            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold login-btn mb-3">Sign In</button>
            <div class="text-center">
              <small class="text-muted">Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></small>
            </div>
          </form>
        </div>
        
        <div id="signupTab" class="tab-pane p-4" style="display: none;">
          <form id="signupForm">
            <div class="mb-4">
              <label class="form-label fw-bold">Full Name</label>
              <input type="text" class="form-control login-input" id="signupName" placeholder="John Doe" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Email</label>
              <input type="email" class="form-control login-input" id="signupEmail" placeholder="your@email.com" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Password</label>
              <input type="password" class="form-control login-input" id="signupPassword" placeholder="••••••••" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Confirm Password</label>
              <input type="password" class="form-control login-input" id="signupConfirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold login-btn mb-3">Create Account</button>
            <div class="text-center">
              <small class="text-muted">Already have an account? <a href="#" onclick="showLogin()">Sign In</a></small>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.login-input {
  border: 2px solid #e9ecef;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 16px;
  transition: all 0.3s;
  background: rgba(255,255,255,0.95);
}

.login-input:focus {
  border-color: #1a5778;
  box-shadow: 0 0 0 0.2rem rgba(26, 87, 120, 0.25);
  background: white;
}

.login-btn {
  border-radius: 12px;
  padding: 12px;
  font-size: 16px;
  height: 50px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,123,255,0.4);
}

.success-btn {
  background: linear-gradient(45deg, #28a745, #20c997) !important;
}

#authModal .modal-content {
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
}

.user-info {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(26, 87, 120, 0.9);
  color: white;
  padding: 10px 20px;
  border-radius: 25px;
  font-weight: bold;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

.logout-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 5px 15px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 10px;
}

.logout-btn:hover {
  background: rgba(255,255,255,0.3);
}
</style>

<script>
let currentUser = null;
const users = JSON.parse(localStorage.getItem('users')) || {};

// Check if user is logged in
if (!currentUser && !sessionStorage.getItem('isAuthenticated')) {
    // Show login modal immediately
    document.addEventListener('DOMContentLoaded', function() {
        new bootstrap.Modal(document.getElementById('authModal'), {
            backdrop: 'static',
            keyboard: false
        }).show();
    });
} else {
    currentUser = sessionStorage.getItem('currentUser');
    showUserInfo();
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (users[email] && users[email].password === password) {
        currentUser = email;
        sessionStorage.setItem('isAuthenticated', 'true');
        sessionStorage.setItem('currentUser', email);
        bootstrap.Modal.getInstance(document.getElementById('authModal')).hide();
        showUserInfo();
        updateStockDisplay(); // Refresh stock
    } else {
        alert('❌ Invalid email or password!');
    }
});

document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('signupConfirmPassword').value;
    
    if (password !== confirmPassword) {
        alert('❌ Passwords do not match!');
        return;
    }
    
    if (users[email]) {
        alert('❌ Email already registered!');
        return;
    }
    
    users[email] = { name, password };
    localStorage.setItem('users', JSON.stringify(users));
    
    currentUser = email;
    sessionStorage.setItem('isAuthenticated', 'true');
    sessionStorage.setItem('currentUser', email);
    bootstrap.Modal.getInstance(document.getElementById('authModal')).hide();
    showUserInfo();
    updateStockDisplay();
});

function showSignup() {
    document.getElementById('loginTab').style.display = 'none';
    document.getElementById('signupTab').style.display = 'block';
}

function showLogin() {
    document.getElementById('signupTab').style.display = 'none';
    document.getElementById('loginTab').style.display = 'block';
}

function showUserInfo() {
    if (currentUser) {
        const userInfo = document.createElement('div');
        userInfo.className = 'user-info';
        userInfo.innerHTML = `
            👋 Hi, ${users[currentUser]?.name || currentUser} 
            <button class="logout-btn ms-2" onclick="logout()">Logout</button>
        `;
        document.body.appendChild(userInfo);
    }
}

function logout() {
    currentUser = null;
    sessionStorage.clear();
    location.reload();
}

function checkAuth() {
    if (!sessionStorage.getItem('isAuthenticated')) {
        new bootstrap.Modal(document.getElementById('authModal')).show();
        return false;
    }
    return true;
}

document.addEventListener('click', function(e) {
    if ((e.target.classList.contains('addCart') || e.target.classList.contains('buyNow')) && !checkAuth()) {
        e.preventDefault();
        e.stopPropagation();
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
