<!DOCTYPE html>
<html>
<head>
<title>Stock Control</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Stock Control Panel</h2>

<table class="table table-bordered">
<thead>
<tr>
<th>Product</th>
<th>Stock</th>
<th>Set</th>
<th>Status</th>
</tr>
</thead>
<tbody id="stockTable"></tbody>
</table>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function render(){
let html="";

products.forEach((p,i)=>{
html += `
<tr>
<td>${p.name}</td>
<td>${p.stock}</td>
<td>
<input type="number" id="stock${i}" class="form-control" placeholder="Enter stock">
</td>
<td>
<button class="btn btn-success btn-sm" onclick="updateStock(${i})">Update</button>
<button class="btn btn-danger btn-sm" onclick="setZero(${i})">Sold Out</button>
<button class="btn btn-warning btn-sm" onclick="setPreOrder(${i})">Pre-Order</button>
</td>
</tr>
`;
});

document.getElementById("stockTable").innerHTML = html;
}

function updateStock(i){
let val = document.getElementById("stock"+i).value;
products[i].stock = parseInt(val);
save();
render();
}

function setZero(i){
products[i].stock = 0;
save();
render();
}

function setPreOrder(i){
products[i].stock = 999;
save();
render();
}

function save(){
localStorage.setItem("products", JSON.stringify(products));
}

render();
</script>

</body>
</html>
